name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.0, 8.1, 8.2, 8.3, 8.4]
        laravel: ['8.*', '9.*', '10.*', '11.*', '12.*']
        include:
          - laravel: '8.*'
            testbench: '6.*'
          - laravel: '9.*'
            testbench: '7.*'
          - laravel: '10.*'
            testbench: '8.*'
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
        exclude:
          # Laravel 8/9 never supported PHP 8.3+
          - laravel: '8.*'
            php: 8.3
          - laravel: '8.*'
            php: 8.4
          - laravel: '9.*'
            php: 8.3
          - laravel: '9.*'
            php: 8.4
          # Laravel 10 tops out at PHP 8.3
          - laravel: '10.*'
            php: 8.4
          # Laravel 11/12 require PHP 8.2+
          - laravel: '11.*'
            php: 8.0
          - laravel: '11.*'
            php: 8.1
          - laravel: '12.*'
            php: 8.0
          - laravel: '12.*'
            php: 8.1

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite3
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run test suite
        run: vendor/bin/phpunit

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test
